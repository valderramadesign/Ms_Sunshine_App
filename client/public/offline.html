<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>You're offline — Ms. Sunshine</title>
    <meta name="theme-color" content="#f5f5f5" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: "M PLUS Rounded 1c", "Hiragino Maru Gothic ProN", ui-rounded, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #fff6df;
        color: #4a3b28;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 320px;
      }
      .logo {
        width: min(96px, 28vw);
        height: min(96px, 28vw);
        border-radius: 24px;
        margin: 0 auto 20px;
        display: block;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 800;
        margin-bottom: 10px;
      }
      p {
        font-size: 1rem;
        line-height: 1.5;
        color: #7a6a4f;
        margin-bottom: 24px;
      }
      button {
        font: inherit;
        font-weight: 700;
        color: #4a3b28;
        background: #ffd97a;
        border: none;
        border-radius: 999px;
        padding: 12px 28px;
        cursor: pointer;
      }
      button:active {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="/icons/icon-192.png" alt="Ms. Sunshine" />
      <h1>You're offline</h1>
      <p>Ms. Sunshine needs an internet connection. Please check your connection and try again.</p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
